<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Drive</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="hero" aria-label="Telegram Drive">
        <img class="logo" src="icons/icon128.png" alt="" />
        <div class="title-block">
          <h1>Telegram Drive</h1>
          <p>Saved Messages as a cloud drive.</p>
        </div>
      </section>

      <div class="actions">
        <button id="openApp" type="button" class="primary">Open Drive</button>
        <button id="openRelease" type="button" class="secondary">Downloads</button>
      </div>

      <p class="note">Files and Telegram login stay inside the Telegram Drive web app.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
